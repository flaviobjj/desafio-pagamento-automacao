name: Pipeline de Testes Automatizados - PGATS

# O Gatilho (Trigger): a pipeline roda a cada "push" (envio de código) [3]
on: [push]

jobs:
  # O Job: uma unidade de trabalho que será executada [3]
  executar-testes:
    # A Máquina: definimos uma versão fixa do sistema operacional [4]
    runs-on: ubuntu-latest
    
    steps:
      # Passo 1: O "vigia" baixa o seu código do GitHub para a máquina de execução
      - uses: actions/checkout@v4

      # Passo 2: Configura o ambiente Node.js na máquina [5]
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Passo 3: Compilação - Instala as dependências (Mocha) definidas no seu package.json [5, 6]
      - name: Instalar Dependências
        run: npm install

      # Passo 4: Execução de Testes - Roda o comando 'npm test' que configuramos [2, 7]
      - name: Rodar Testes de Unidade
        run: npm test